name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '22'

jobs:
  # Job 1: Build and Test
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Restore Stencil build cache
        uses: actions/cache@v4
        with:
          path: |
            packages/web-components/.stencil
            node_modules/.cache
          key: stencil-${{ runner.os }}-${{ hashFiles('packages/web-components/src/**/*.tsx', 'packages/web-components/src/**/*.ts', 'packages/web-components/stencil.config.ts', 'pnpm-lock.yaml') }}
          restore-keys: |
            stencil-${{ runner.os }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run linter
        run: pnpm lint

      - name: Build packages
        run: pnpm build:all

      - name: Run headless tests
        run: pnpm test:headless

      - name: Run Stencil component tests
        run: pnpm -C packages/web-components test:spec

      - name: Run vanilla component tests
        run: pnpm -C packages/vanilla-components test

      - name: Run motion tests
        run: pnpm -C packages/motion-core test

      - name: Run behaviors tests
        run: pnpm test:behaviors

      - name: Run icon-library tests
        run: pnpm -C packages/icon-library test

      - name: Run layout-core tests
        run: pnpm -C packages/layout-core test

      - name: Run Angular wrapper tests
        run: pnpm -C packages/angular-components test

      - name: Run React wrapper tests
        run: pnpm -C packages/react-components test

      - name: Run Vue wrapper tests
        run: pnpm -C packages/vue-components test

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: |
            packages/*/dist/
            packages/*/dist-cjs/
            apps/angular-workspace/dist/
            packages/angular-components/dist/
            packages/react-components/dist/
            packages/vue-components/dist/
            packages/web-components/www/
            packages/web-components/loader/
            packages/web-components/custom-elements.json
          retention-days: 1

  # Job 2: Deploy Storybook
  deploy-storybook:
    name: Deploy Storybook
    needs: build-and-test
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts

      - name: Build Storybook
        run: pnpm build-storybook

      - name: Ensure Cloudflare Pages project exists
        run: |
          PROJECT_NAME="and-web-components-storybook"
          HTTP_CODE=$(curl -s -o /tmp/cf-project-check.json -w "%{http_code}" \
            "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/pages/projects/${PROJECT_NAME}" \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}")
          if [ "$HTTP_CODE" = "404" ]; then
            echo "Creating Cloudflare Pages project: ${PROJECT_NAME}"
            curl -s -o /tmp/cf-project-create.json -w "%{http_code}" \
              -X POST \
              "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/pages/projects" \
              -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
              -H "Content-Type: application/json" \
              -d "{\"name\":\"${PROJECT_NAME}\",\"production_branch\":\"main\"}"
            echo ""
          elif [ "$HTTP_CODE" = "200" ]; then
            echo "Cloudflare Pages project ${PROJECT_NAME} already exists."
          else
            echo "Unexpected response (${HTTP_CODE}) while checking project:"
            cat /tmp/cf-project-check.json
            exit 1
          fi
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy to Cloudflare Pages
        run: pnpm exec wrangler pages deploy packages/web-components/storybook-static --project-name=and-web-components-storybook --branch=${{ github.ref_name }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
